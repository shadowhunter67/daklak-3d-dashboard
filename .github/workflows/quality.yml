name: quality

on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Check formatting
        run: npm run format:check
      - name: Typecheck
        run: npm run typecheck
      - name: Generate public dataset manifest
        run: npm run generate:public-manifest
      - name: Validate public-build source boundaries (registry-exact imports, public/ scan, no internal/confidential/protected paths)
        run: npm run validate:public-build

  unit-and-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 22, cache: npm }
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt
      - run: npm ci
      - name: Install GIS validators
        run: python -m pip install -r scripts/requirements.txt
      - name: Unit tests
        run: npm test
      - name: Validate committed GIS artifacts
        run: npm run validate:data
      - name: Upload validation report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: validation-report-${{ github.run_attempt }}
          path: reports/validation-report.json
          if-no-files-found: error

  build-and-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Generate public dataset manifest
        run: npm run generate:public-manifest
      - name: Production build
        run: npm run build
      - name: Validate public-build dist boundaries (no non-public dataset/credential leakage)
        run: npm run validate:public-build:dist
      - name: Enforce performance budget
        run: npm run check:budget
      - name: Generate build metrics
        run: npm run build:metrics
      - name: Upload build reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: build-reports-${{ github.run_attempt }}
          path: |
            reports/performance-budget.json
            reports/build-metrics.json
            reports/build-metrics.md
          if-no-files-found: error
      - name: Upload verified production build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-dist
          path: dist/
          if-no-files-found: error
          retention-days: 3

  e2e:
    needs: build-and-budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Download verified production build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: production-dist
          path: dist
      - name: Install tested browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Production E2E
        run: npm run test:e2e:prod:built
      - name: Upload Playwright failure evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-failure-${{ github.run_attempt }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Dependency audit
        run: npm run security:audit
      - name: Secret pattern scan
        run: npm run security:secrets
