name: quality

on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Check formatting
        run: npm run format:check
      - name: Typecheck
        run: npm run typecheck

  unit-and-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 22, cache: npm }
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt
      - run: npm ci
      - name: Install GIS validators
        run: python -m pip install -r scripts/requirements.txt
      - name: Unit tests
        run: npm test
      - name: Validate committed GIS artifacts
        run: npm run validate:data
      - name: Upload validation report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: validation-report-${{ github.run_attempt }}
          path: reports/validation-report.json
          if-no-files-found: error

  build-and-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Production build
        run: npm run build
      - name: Enforce performance budget
        run: npm run check:budget
      - name: Generate build metrics
        run: npm run build:metrics
      - name: Upload build reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: build-reports-${{ github.run_attempt }}
          path: |
            reports/performance-budget.json
            reports/build-metrics.json
            reports/build-metrics.md
          if-no-files-found: error
      - name: Upload verified production build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-dist
          path: dist/
          if-no-files-found: error
          retention-days: 3

  e2e:
    needs: build-and-budget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Download verified production build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: production-dist
          path: dist
      - name: Install tested browsers
        run: npx playwright install --with-deps chromium webkit
      - name: Bootstrap missing Linux Vietnamese detail baselines
        if: ${{ hashFiles('e2e/dashboard.spec.ts-snapshots/dashboard-detail-name-24580-desktop-desktop-chromium-linux.png') == '' || hashFiles('e2e/dashboard.spec.ts-snapshots/dashboard-detail-name-24580-mobile-mobile-chromium-linux.png') == '' }}
        env:
          UPDATE_MOBILE_SNAPSHOTS: '1'
        run: npx playwright test --config=playwright.prod.config.ts --grep "Vietnamese detail name visual coverage" --update-snapshots
      - name: Bootstrap missing Linux mobile directory baselines
        if: ${{ hashFiles('e2e/dashboard.spec.ts-snapshots/dashboard-mobile-directory-mobile-chromium-linux.png') == '' || hashFiles('e2e/dashboard.spec.ts-snapshots/dashboard-mobile-directory-middle-focus-mobile-chromium-linux.png') == '' || hashFiles('e2e/dashboard.spec.ts-snapshots/dashboard-mobile-directory-last-focus-mobile-chromium-linux.png') == '' }}
        env:
          UPDATE_MOBILE_SNAPSHOTS: '1'
        run: npx playwright test --config=playwright.prod.config.ts --project=mobile-chromium --grep "intentional mobile visual states" --update-snapshots
      - name: Bootstrap missing Linux adaptive map label baselines
        if: ${{ hashFiles('e2e/dashboard.spec.ts-snapshots/adaptive-map-labels-desktop-chromium-linux.png') == '' || hashFiles('e2e/dashboard.spec.ts-snapshots/adaptive-map-labels-mobile-chromium-linux.png') == '' }}
        run: npx playwright test --config=playwright.prod.config.ts --grep "adaptive administrative and road label visual coverage" --update-snapshots
      - name: Upload bootstrapped Linux mobile baselines
        if: ${{ always() && hashFiles('e2e/dashboard.spec.ts-snapshots/dashboard-mobile-*-linux.png') != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-baselines-linux-${{ github.run_attempt }}
          path: |
            e2e/dashboard.spec.ts-snapshots/dashboard-mobile-*-linux.png
            e2e/dashboard.spec.ts-snapshots/dashboard-detail-name-24580-*-linux.png
            e2e/dashboard.spec.ts-snapshots/adaptive-map-labels-*-linux.png
          if-no-files-found: error
      - name: Production E2E
        run: npm run test:e2e:prod:built
      - name: Upload Playwright failure evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-failure-${{ github.run_attempt }}
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: Dependency audit
        run: npm run security:audit
      - name: Secret pattern scan
        run: npm run security:secrets
