name: Public data refresh (foundation)

# Runs the offline recorded-fixture pipeline (docs/adr/0004-public-data-ingestion.md) on demand.
# This workflow ships only the "recorded-fixture" adapter — no real network source is onboarded
# yet, so every run exercises the same fixture end-to-end without ever fetching anything live.
# Never commits directly to main: a low-risk result opens a PR (auto-merge only if the source is
# declared `maturity: auto-merge-eligible` in data/source-registry.yml — see
# scripts/data-refresh/autoMergePolicy.mjs); anything else updates one tracked issue instead of
# spamming a new one.
#
# No `schedule` trigger: with only an internal fixture registered, an unattended weekly run would
# either produce the same no-op "no-change" result forever or need to be disabled anyway once a
# real source needs its own cadence — see docs/adr/0004-public-data-ingestion.md section 10
# "Schedule". Scheduling comes back (per-dataset, driven by each entry's own `schedule` field) once
# a real source is onboarded.

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Dry run — never writes last-known-good, generated source-health, or opens a PR/issue'
        type: boolean
        default: false
      commissioningScenario:
        description: 'Commissioning test only: force a specific fixture scenario (still fully offline — see scripts/data-refresh/fixtures/commissioning-*.json)'
        type: choice
        options:
          - none
          - low-risk
          - hard-stop
        default: none

permissions:
  contents: read

concurrency:
  group: public-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with: { node-version: 22, cache: npm }
      - run: npm ci

      # Idempotent: label already existing is a no-op with --force. Removes the "create this label
      # by hand once" manual step from docs/public-data-refresh.md.
      - name: Ensure the manual-review-required label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh label create manual-review-required --color d93f0b --force

      - name: Run the offline recorded-fixture pipeline
        id: run
        run: |
          set -euo pipefail
          FLAGS=()
          if [ "${{ inputs.dryRun }}" = "true" ]; then FLAGS+=(--dry-run); fi
          SCENARIO="${{ inputs.commissioningScenario }}"
          if [ -n "$SCENARIO" ] && [ "$SCENARIO" != "none" ]; then
            FLAGS+=("--fixture-override=scripts/data-refresh/fixtures/commissioning-${SCENARIO}-response.json")
          fi
          node scripts/data-refresh/run.mjs --dataset=investment-opportunities-daklak-illustrative "${FLAGS[@]}"

      # Machine-readable result written by run.mjs itself (reports/data-refresh/run-result.json) —
      # read with jq, never by grepping console output (docs/adr/0004-public-data-ingestion.md
      # section 10 "workflow robustness").
      - name: Read the machine-readable run result
        id: result
        run: |
          set -euo pipefail
          RESULT_FILE=reports/data-refresh/run-result.json
          {
            echo "riskLevel=$(jq -r '.riskLevel' "$RESULT_FILE")"
            echo "autoMergeEligible=$(jq -r '.autoMergeEligible' "$RESULT_FILE")"
            echo "hasChange=$(jq -r '.hasLastKnownGoodChange' "$RESULT_FILE")"
          } >> "$GITHUB_OUTPUT"

      - name: Upload run report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: data-refresh-report
          path: |
            reports/data-refresh/*.run-report.*
            reports/data-refresh/run-result.json
          retention-days: 30

      - name: Open or update a PR for this run's low-risk change (skipped on dry run / no-change)
        if: steps.result.outputs.riskLevel == 'low-risk' && steps.result.outputs.hasChange == 'true' && inputs.dryRun != true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="data-refresh/investment-opportunities-daklak-illustrative-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add reports/data-refresh/last-known-good data/published/source-health.json src/assets/data/data-refresh-source-health.json
          git commit -m "chore(data-refresh): update investment-opportunities-daklak-illustrative (low-risk)"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create --title "chore(data-refresh): low-risk update — investment-opportunities-daklak-illustrative" \
            --body-file reports/data-refresh/investment-opportunities-daklak-illustrative.run-report.md \
            --base main --head "$BRANCH" --assignee shadowhunter67)
          if [ "${{ steps.result.outputs.autoMergeEligible }}" = "true" ]; then
            gh pr merge "$PR_URL" --auto --squash \
              || echo "auto-merge could not be enabled (branch protection may require enabling it manually in repo settings) — PR is still open for review. Not treated as a workflow failure."
          else
            gh pr edit "$PR_URL" --add-label manual-review-required
            echo "This run is not auto-merge-eligible (see the PR body for why) — opened for manual review, not merged automatically."
          fi

      # Dedup via the stable marker in reportGen.mjs: update the ONE tracked issue instead of
      # creating a new one every run. Re-applies assignee/label on every hard-stop in case either
      # was removed from the existing issue between runs.
      - name: Update the single tracked source-health issue on hard-stop
        if: steps.result.outputs.riskLevel == 'hard-stop' && inputs.dryRun != true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          MARKER='<!-- daklak-data-refresh-source-health -->'
          EXISTING=$(gh issue list --search "$MARKER in:body" --state open --json number --jq '.[0].number')
          BODY_FILE="reports/data-refresh/investment-opportunities-daklak-illustrative.issue-body.md"
          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            gh issue edit "$EXISTING" --add-assignee shadowhunter67 --add-label manual-review-required
            gh issue comment "$EXISTING" --body-file "$BODY_FILE"
          else
            gh issue create --title "Data source health: investment-opportunities-daklak-illustrative" \
              --body-file "$BODY_FILE" \
              --assignee shadowhunter67 \
              --label manual-review-required
          fi
